<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Activity</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="index-link">
      <div class="logo">CE Web</div>
      </a>
      <div class="nav_auth">
        <a href="login.html">
          <button class="button_login">Log in</button>
        </a>
        <a href="signup.html">
          <button class="button_signup">Sign Up</button>
        </a>
      </div>
    </nav>
    <div class="form-page-wrapper">
        <div class="form-container">
            <h2>สร้างกิจกรรมใหม่</h2>
            <form class="default-form" onsubmit="handleCreateEvent(event)">
                <p>ชื่อกิจกรรม</p>
                <input type="text" placeholder="ชื่อกิจกรรม" id="title" required>
                <p>รายละเอียดกิจกรรม</p>
                <textarea placeholder="รายละเอียด" id="description" required></textarea>
                <p>ระยะเวลาเปิดรับ</p>
                <input type="datetime-local"  id="date" required>
                <p>จำนวนคนสูงสุด</p>
                <input type="number" placeholder="จำนวนคนสูงสุด" id="maxParticipants" required>

                <div class="upload-section">
                    <p>รูปภาพกิจกรรม</p>
                    <input type="file" id="image" accept="image/*" onchange="previewImage(event)">
                    <div class="image-preview">
                        <img id="preview-img" src="#" alt="Preview">
                    </div>
                </div>

                <button type="submit">สร้างกิจกรรม</button>
            </form>
        </div>
    </div>
    <a href="index.html" class="close-button">X</a>
    <script src="api.js"></script>
    <script src="main.js"></script>
  </body>
</html>
