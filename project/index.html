<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE Web - Activity</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="index-link">
      <div class="logo">CE Web</div>
      </a>
      <div class="all_activity">
        <button id="btn_available" class="button_available">Available</button>
        <button id="btn_close" class="button_close">Close</button>
      </div>
      <div class="nav_auth">
        <a href="login.html">
          <button class="button_login">Log in</button>
        </a>
        <a href="signup.html">
          <button class="button_signup">Sign Up</button>
        </a>
      </div>
    </nav>

    <main class="container">
      <section class="search_section">
        <a href="create_act.html">
        <button class="button_new">New</button>
        </a>
        <input
          type="text"
          placeholder="Search by keywords..."
          class="search_input"
        />
        <button class="button_filter">Filter</button>
      </section>

      <h2>Available Activity</h2>
      <div id="event-list" class="activity_grid">
        <a href="detail.html" class="activity_card_link">
          <div class="activity_card">
            <img src="cat.jpg" alt="cat" class="activity_img" />
            <div class="activity_info">
              <h3>Activity Name</h3>
              <p>Description Activity Card...</p>
              <span class="status status_open">Status: Open</span>
            </div>
          </div>
        </a>

        <div class="activity_card">
          <img src="cat.jpg" alt="cat" class="activity_img" />
          <div class="activity_info">
            <h3>Activity Name</h3>
            <p>Description Activity Card...</p>
            <span class="status status_close">Status: Close</span>
          </div>
        </div>

      </div>
    </main>
    <script src="index.js"></script>
    <script src="api.js"></script>
  </body>
</html>
